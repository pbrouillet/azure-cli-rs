name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone azure-cli for codegen
        run: git clone --depth 1 https://github.com/Azure/azure-cli.git azure-cli

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: az-cli-rs -> target
          key: ${{ matrix.name }}

      - name: Build
        working-directory: az-cli-rs
        run: cargo build --verbose

      - name: Test
        working-directory: az-cli-rs
        run: cargo test --verbose
