name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (e.g. v0.1.0). Leave empty for a draft using the commit SHA."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: azrs
            asset: azrs-linux-x86_64
          - name: darwin-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            binary: azrs
            asset: azrs-darwin-x86_64
          - name: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: azrs
            asset: azrs-darwin-arm64
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: azrs.exe
            asset: azrs-windows-x86_64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone azure-cli for codegen
        run: |
          git clone --depth 1 https://github.com/Azure/azure-cli.git azure-cli

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: az-cli-rs -> target
          key: ${{ matrix.target }}

      - name: Build release binary
        working-directory: az-cli-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp az-cli-rs/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag_name }}" ]]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.tag.outputs.tag }}
          draft: ${{ steps.tag.outputs.draft }}
          generate_release_notes: true
          files: artifacts/*
