# Configuration for aaz-gen build-time code generation.
# Each [[modules]] entry maps a service to its AAZ source directory.
# cli_prefix is used for clap command naming.

azure_cli_path = "../azure-cli"

# Full network module — all subgroups nested under `azrs network`
[[modules]]
service = "network"
cli_prefix = "network"
aaz_subpath = "src/azure-cli/azure/cli/command_modules/network/aaz/latest/network"

# Full VM module — all subgroups nested under `azrs vm`
[[modules]]
service = "vm_gen"
cli_prefix = "vm"
skip_top_level = true
aaz_subpath = "src/azure-cli/azure/cli/command_modules/vm/aaz/latest/vm"

[[modules]]
service = "cosmosdb"
cli_prefix = "cosmosdb"
aaz_subpath = "src/azure-cli/azure/cli/command_modules/cosmosdb/aaz/latest"

